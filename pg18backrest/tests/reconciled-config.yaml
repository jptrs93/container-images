settings:
  max_connections: 75
hba:
  - host all all all scram-sha-256
initdb:
  postgres_user:
    value: integration_admin
  postgres_password: ${INTEGRATION_POSTGRES_PASSWORD}
  postgres_db:
    value: app
pgbackrest:
  enabled: true
  stanza: integration
  s3:
    host: pg18backrest-backup-minio
    port: 9000
    bucket: postgres-backups
    verify_tls: false
    access_key: ${INTEGRATION_S3_ACCESS_KEY}
    secret_key: ${INTEGRATION_S3_SECRET_KEY}
  schedules:
    full: '59 23 31 12 *'
    differential: '59 23 31 12 *'
    check: '59 23 31 12 *'
roles:
  - name:
      value: app_owner
    password: ${INTEGRATION_OWNER_PASSWORD}
  - name:
      value: reader_one
    password: ${INTEGRATION_READER_ONE_PASSWORD}
  - name:
      value: reader_two
    password: ${INTEGRATION_READER_TWO_PASSWORD}
    permissions:
      - database: app
        schema: app
        grants:
          - USAGE
        table_grants:
          - SELECT
  - name:
      value: app_writer
    password: ${INTEGRATION_WRITER_PASSWORD}
    permissions:
      - database: app
        schema: app
        grants:
          - USAGE
        table_grants:
          - SELECT
          - INSERT
          - UPDATE
  - name:
      value: audit_reader
    password: ${INTEGRATION_AUDIT_READER_PASSWORD}
    permissions:
      - database: app
        schema: app
        grants:
          - USAGE
        table_grants:
          - SELECT
databases:
  - name: app
    owner: app_owner
    schemas:
      - app
      - analytics
    extensions:
      - pgcrypto
