settings:
  max_connections: 50
hba:
  - host all all all scram-sha-256
initdb:
  postgres_user:
    value: integration_admin
  postgres_password:
    env_value_key: INTEGRATION_POSTGRES_PASSWORD
  postgres_db:
    value: app
pgbackrest:
  enabled: false
  stanza: integration
  s3:
    endpoint: http://pg18backrest-minio:9000
    bucket: postgres-backups
    verify_tls: false
    access_key:
      env_value_key: INTEGRATION_S3_ACCESS_KEY
      env_file_path_key: INTEGRATION_S3_ACCESS_KEY_FILE
    secret_key:
      env_value_key: INTEGRATION_S3_SECRET_KEY
      env_file_path_key: INTEGRATION_S3_SECRET_KEY_FILE
