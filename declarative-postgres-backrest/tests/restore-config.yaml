settings:
  max_connections: 75
hba:
  - host all all all scram-sha-256
initdb:
  postgres_user: integration_admin
  postgres_password: ${INTEGRATION_POSTGRES_PASSWORD}
  postgres_db: postgres
pgbackrest:
  enabled: false
  stanza: integration
  s3:
    host: declarative-postgres-backrest-restore-minio
    port: 9000
    bucket: postgres-backups
    verify_tls: false
    access_key: ${INTEGRATION_S3_ACCESS_KEY}
    secret_key: ${INTEGRATION_S3_SECRET_KEY}
