settings:
  max_connections: 100
hba:
  - host all all 10.0.0.0/8 scram-sha-256
initdb:
  postgres_user: ${POSTGRES_USER}
  postgres_password: ${POSTGRES_PASSWORD}
  postgres_db: postgres
pgbackrest:
  enabled: true
  stanza: app-prod
  s3:
    host: ${S3_HOST}
    bucket: postgres-backups
    region: us-east-1
    uri_style: path
    verify_tls: true
    access_key: ${S3_ACCESS_KEY}
    secret_key: ${S3_SECRET_KEY}
  retention:
    full: 2
    archive: 2
  schedules:
    full: '0 2 * * 0'
    differential: '0 2 * * 1-6'
    check: '*/5 * * * *'
  archive:
    push_queue_max: 1GiB
    timeout_seconds: 60
  process_max: 4
  initial_backup: true
  timezone: UTC
roles:
  - name: app_user
    password: ${APP_DATABASE_PASSWORD}
    permissions:
      - database: radkit
        grants:
          - CREATE
          - USAGE
        table_grants:
          - SELECT
          - INSERT
          - UPDATE
          - DELETE
databases:
  - name: radkit
    owner: app_user
    schemas:
      - staging
    extensions:
      - pgcrypto
