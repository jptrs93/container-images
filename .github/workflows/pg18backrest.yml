name: Build pg18backrest

on:
  pull_request:
    branches: [main]
    paths:
      - 'pg18backrest/**'
      - '.github/workflows/pg18backrest.yml'
  push:
    branches: [main]
    paths:
      - 'pg18backrest/**'
      - '.github/workflows/pg18backrest.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/jptrs93/pg18backrest

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.0.0
        with:
          go-version-file: pg18backrest/go.mod
      - name: Test Go packages
        run: go test ./...
        working-directory: pg18backrest
      - name: Build test image
        run: docker build --platform linux/amd64 -f pg18backrest/Dockerfile -t pg18backrest:test .
      - name: Run integration test
        run: pg18backrest/tests/integration.sh pg18backrest:test

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: |
          docker build --platform linux/amd64 -f pg18backrest/Dockerfile \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:18 \
            -t $IMAGE_NAME:18.4 \
            -t $IMAGE_NAME:sha-$GITHUB_SHA \
            .
      - name: Publish image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:18
          docker push $IMAGE_NAME:18.4
          docker push $IMAGE_NAME:sha-$GITHUB_SHA
